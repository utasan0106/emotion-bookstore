<!-- ===== 追加：Content Security Policy（CSP） =====
     静的ホスティング（Vercel等）で完結させるため<meta>タグ方式で設定。
     head内の最上部に置くことで、以降にパースされる要素（GA4・Xの埋め込み・インラインscript等）すべてに適用される。
     許可した外部通信先：
       - GA4（googletagmanager.com / google-analytics.com）
       - Xの投稿埋め込み（platform.twitter.com / twimg.com / syndication.twitter.com）
       - Googleフォント（style.css内@importで読み込んでいるfonts.googleapis.com / fonts.gstatic.com）
       - Amazon／楽天／YouTube／Spotifyへのリンク（<a>タグでの遷移のみ。fetch等での送信はconnect-srcで制限）
       - Google Books API（www.googleapis.com）／iTunes Search API（itunes.apple.com）：
         「今月の寄り道」および棚の本・音楽おすすめで、季節や気分のキーワードから最新の作品を
         取得するためにブラウザから直接呼び出す。送信されるのは検索キーワードのみで、
         利用者が編纂机で綴った文章やその他の個人情報は一切含まれない（main.js側で徹底）。
     'unsafe-inline'（script-src）について：本ページは複数箇所にインラインscript（GA4初期化・アコーディオン開閉など）を
     ビルド工程なしの静的ファイルとして直接記述しているため、nonce/hashを使わない<meta>方式のCSPでは
     'unsafe-inline'を外すとそれらが機能しなくなる。XSS対策の主眼は「ユーザー入力を描画前にエスケープすること」
     （main.js側で対応済み。外部APIから受け取った書誌情報も同様にエスケープしてから描画する）に置き、
     CSPはobject-src/base-uri/frame-src等の制限による多層防御として設定している。
-->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://platform.twitter.com https://*.twimg.com;
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
  img-src 'self' data: https:;
  font-src 'self' data: https://fonts.gstatic.com;
  connect-src 'self' https://www.google-analytics.com https://www.googletagmanager.com https://analytics.google.com https://*.twitter.com https://*.x.com https://*.twimg.com https://www.googleapis.com https://itunes.apple.com;
  frame-src https://platform.twitter.com https://syndication.twitter.com https://twitter.com https://x.com https://*.twimg.com;
  base-uri 'self';
  form-action 'self';
  object-src 'none';
">

/* --- 追加：トップページのアコーディオン用スタイル --- */
.about-accordion-wrap {
  max-width: 600px;
  margin: 32px auto 24px;
  border-top: 1px dashed var(--paper-shadow);
  border-bottom: 1px dashed var(--paper-shadow);
  padding: 16px 0;
  text-align: center;
}
.about-accordion-summary {
  font-size: 13.5px;
  color: var(--ink);
  line-height: 1.6;
  margin-bottom: 12px;
}
.about-accordion-btn {
  background: none;
  border: none;
  color: var(--ink-soft);
  font-size: 12px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 8px;
  transition: color 0.2s ease;
}
.about-accordion-btn:hover {
  color: var(--wine);
}
.about-accordion-content {
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: max-height 0.4s ease, opacity 0.4s ease, margin 0.4s ease, padding 0.4s ease;
  background: rgba(255, 255, 255, 0.4);
  border-radius: 6px;
  text-align: left;
  font-size: 13px;
  line-height: 1.7;
  color: var(--ink);
}
.about-accordion-content.open {
  max-height: 400px;
  opacity: 1;
  padding: 16px;
  margin-top: 12px;
  border: 1px solid var(--paper-shadow);
}
.about-accordion-content b {
  display: block;
  font-family: var(--font-display);
  color: var(--wine);
  margin-bottom: 8px;
  font-size: 14.5px;
  text-align: center;
}
body.night .about-accordion-content {
  background: #332E26;
  border-color: var(--paper-shadow);
}
/* --- 追加：データの保存場所・バックアップ説明アコーディオン --- */
.about-data-accordion{
  max-width: 600px;
  margin: 0 auto 24px;
  text-align: left;
}
.about-data-accordion summary{
  cursor: pointer;
  text-align: center;
  list-style: none;
  font-size: 12px;
  color: var(--ink-soft);
  padding: 4px 8px;
  transition: color 0.2s ease;
}
.about-data-accordion summary::-webkit-details-marker{ display:none; }
.about-data-accordion summary:before{ content: "📦 "; }
.about-data-accordion summary:hover{ color: var(--wine); }
.about-data-accordion[open] summary{ color: var(--wine); }
.about-data-content{
  margin-top: 10px;
  padding: 14px 16px;
  background: rgba(255,255,255,0.4);
  border: 1px solid var(--paper-shadow);
  border-radius: 6px;
  font-size: 13px;
  line-height: 1.75;
  color: var(--ink);
}
.about-data-content b{
  display: block;
  font-family: var(--font-display);
  color: var(--wine);
  margin-bottom: 8px;
  font-size: 14.5px;
  text-align: center;
}
body.night .about-data-content{
  background: #332E26;
  border-color: var(--paper-shadow);
}
