<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<meta property="og:url" content="https://emotion-bookstore.vercel.app/">

<meta name="twitter:title" content="みんなの感情書店">
<meta name="twitter:description" content="名もなき気持ちに、名前をあげる。感情の書店で、自分だけの一冊を。">
<meta name="twitter:image" content="https://emotion-bookstore.vercel.app/ogp.png">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%236E2A34'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle'%3E%F0%9F%93%96%3C/text%3E%3C/svg%3E">
<title>みんなの感情書店</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap');

:root{
  --paper:#EAD9B8;
  --paper-2:#E1CBA0;
  --paper-shadow:#C9AF80;
  --ink:#2B2118;
  --ink-soft:#4A3B2C;
  --wood:#3E2A1C;
  --wood-2:#5A3D28;
  --wine:#6E2A34;
  --wine-2:#8A3A46;
  --gold:#A8823C;
  --gold-soft:#C9A55C;
  --sage:#5C6B4F;
  --font-display:'Shippori Mincho','Yu Mincho',serif;
  --font-body:'Zen Kaku Gothic New','Yu Gothic',sans-serif;
}

*{box-sizing:border-box;}
.hidden{display:none !important;}
body{margin:0;}

.shop{
  background:
    radial-gradient(ellipse at top left, rgba(255,255,255,0.15), transparent 60%),
    var(--paper);
  background-image:
    repeating-linear-gradient(0deg, rgba(60,40,20,0.02) 0px, rgba(60,40,20,0.02) 1px, transparent 1px, transparent 3px),
    linear-gradient(180deg, var(--paper) 0%, var(--paper-2) 100%);
  color:var(--ink);
  font-family:var(--font-body);
  min-height:100vh;
  line-height:1.8;
}

/* ---- motion off ---- */
body.no-motion *, body.no-motion *::before, body.no-motion *::after{
  animation:none !important;
  transition:none !important;
}
@media (prefers-reduced-motion: reduce){
  *, *::before, *::after{ animation-duration:0.01ms !important; transition-duration:0.01ms !important; }
}

.reveal{opacity:0; transform:translateY(14px); transition:opacity .7s ease, transform .7s ease;}
.reveal.visible{opacity:1; transform:none;}
body.no-motion .reveal{opacity:1; transform:none;}

/* ---- mood lighting layer (照明・色温度) ---- */
#moodLayer{
  position:fixed; inset:0;
  pointer-events:none;
  z-index:200;
  background:rgba(0,0,0,0);
  transition:background 2.5s ease;
}
body.no-motion #moodLayer{display:none;}

.entrance{
  text-align:center;
  padding:64px 24px 48px;
  border-bottom:1px solid var(--paper-shadow);
  position:relative;
}
.entrance::before{
  content:"";
  display:block;
  width:100%;
  height:6px;
  background:repeating-linear-gradient(90deg, var(--wine) 0 28px, var(--season-accent, var(--gold)) 28px 32px);
  opacity:0.85;
  margin-bottom:40px;
}
.eyebrow{
  font-family:var(--font-display);
  letter-spacing:.35em;
  font-size:12px;
  color:var(--season-accent, var(--wine));
  margin:0 0 18px;
}
.entrance h1{
  font-family:var(--font-display);
  font-weight:800;
  font-size:clamp(30px,5vw,52px);
  margin:0 0 14px;
  letter-spacing:.06em;
  color:var(--ink);
}
.tagline{
  font-family:var(--font-display);
  font-size:17px;
  color:var(--ink-soft);
  margin:0 0 6px;
}
.sub-tagline{
  font-size:13px;
  color:var(--ink-soft);
  margin:0 0 30px;
  letter-spacing:.05em;
}
.enter-btn{
  font-family:var(--font-display);
  background:var(--wine);
  color:var(--paper);
  border:none;
  padding:14px 34px;
  font-size:15px;
  letter-spacing:.1em;
  border-radius:2px;
  cursor:pointer;
  box-shadow:0 3px 0 var(--wood);
  transition:transform .15s ease;
}
.enter-btn:hover{transform:translateY(-2px);}
.enter-btn:active{transform:translateY(1px); box-shadow:0 1px 0 var(--wood);}

.pref-row{
  display:flex;
  gap:10px;
  justify-content:center;
  margin-top:26px;
  flex-wrap:wrap;
}
.pref-toggle{
  font-family:var(--font-body);
  font-size:11.5px;
  letter-spacing:.08em;
  padding:6px 16px;
  border:1.5px solid var(--paper-shadow);
  background:rgba(255,255,255,0.25);
  color:var(--ink-soft);
  opacity:.7;
  border-radius:20px;
  cursor:pointer;
  transition:all .15s ease;
}
.pref-toggle::before{
  content:"○ ";
}
.pref-toggle.on{
  border-color:var(--wine);
  color:#fff9ec;
  background:var(--wine);
  opacity:1;
  font-weight:600;
  box-shadow:0 2px 6px rgba(110,42,52,0.35);
}
.pref-toggle.on::before{
  content:"● ";
}
.trust-row{
  display:flex;
  gap:8px;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:16px;
}
.trust-badge{
  font-size:10.5px;
  color:var(--ink-soft);
  letter-spacing:.02em;
  padding:4px 10px;
  border:1px solid var(--paper-shadow);
  border-radius:12px;
  background:rgba(255,255,255,0.3);
}

/* ---- book bookmark page navigation ---- */
.page-nav{
  position:sticky;
  top:0;
  z-index:40;
  display:flex;
  justify-content:center;
  gap:6px;
  padding:10px 12px;
  background:linear-gradient(180deg, rgba(234,217,184,0.97), rgba(234,217,184,0.9));
  backdrop-filter:blur(2px);
  border-bottom:1px solid var(--paper-shadow);
  flex-wrap:wrap;
}
.page-tab{
  font-family:var(--font-display);
  font-size:12.5px;
  letter-spacing:.06em;
  padding:8px 16px 9px;
  border:1px solid var(--gold);
  border-bottom:none;
  border-radius:8px 8px 3px 3px;
  background:#fdf6e6;
  color:var(--ink-soft);
  cursor:pointer;
  position:relative;
  top:0;
  transition:top .15s ease, background .15s ease, color .15s ease;
}
.page-tab:hover{ top:-2px; }
.page-tab.active{
  background:var(--wine);
  color:#f6e8c9;
  border-color:var(--wine);
  top:-3px;
  box-shadow:0 4px 8px rgba(0,0,0,0.15);
}

.intro-explainer{
  max-width:920px;
  margin:0 auto;
  padding:36px 24px;
  border-bottom:1px solid var(--paper-shadow);
}
.intro-explainer.in-header{
  border-bottom:none;
  padding:30px 0 6px;
}
.intro-kicker{
  font-family:var(--font-display);
  font-size:13px;
  color:var(--wine);
  text-align:center;
  letter-spacing:.1em;
  margin:0 0 22px;
}
.intro-steps{
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:16px;
}
.intro-step{
  text-align:center;
  padding:16px 10px;
  background:rgba(255,255,255,0.35);
  border:1px solid var(--paper-shadow);
  border-radius:6px;
  font-family:var(--font-body);
  cursor:pointer;
  transition:transform .15s ease, background .15s ease, border-color .15s ease;
}
.intro-step:hover{
  transform:translateY(-2px);
  background:rgba(255,255,255,0.6);
  border-color:var(--gold);
}
.intro-num{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:26px; height:26px;
  border-radius:50%;
  background:var(--gold);
  color:#fff9ec;
  font-family:var(--font-display);
  font-size:13px;
  margin-bottom:8px;
}
.intro-title{
  font-family:var(--font-display);
  font-size:14.5px;
  color:var(--ink);
  margin:0 0 6px;
}
.intro-text{
  font-size:12px;
  color:var(--ink-soft);
  margin:0;
  line-height:1.6;
}
@media (max-width:640px){
  .intro-steps{ grid-template-columns:repeat(2, 1fr); }
}

/* ---- page-turn transition ---- */
.page-turn-overlay{
  position:fixed;
  inset:0;
  z-index:70;
  pointer-events:none;
  background:linear-gradient(100deg, rgba(234,217,184,0) 0%, rgba(253,246,230,0.97) 45%, rgba(234,217,184,0) 92%);
  transform:translateX(-120%);
  opacity:0;
}
.page-turn-overlay.active{
  animation:pageTurnSwipe 620ms cubic-bezier(.4,0,.2,1);
}
@keyframes pageTurnSwipe{
  0%{ transform:translateX(-120%) rotateY(0deg) skewX(0deg); opacity:0; }
  12%{ opacity:1; }
  50%{ transform:translateX(0%) rotateY(6deg) skewX(-4deg); opacity:1; }
  88%{ opacity:1; }
  100%{ transform:translateX(120%) rotateY(0deg) skewX(0deg); opacity:0; }
}

section{
  max-width:920px;
  margin:0 auto;
  padding:56px 24px;
  border-bottom:1px solid var(--paper-shadow);
  scroll-margin-top:64px;
}
section:last-of-type{border-bottom:none;}

.section-head{
  display:flex;
  align-items:baseline;
  gap:14px;
  margin-bottom:28px;
}
.section-num{
  font-family:var(--font-display);
  color:var(--wine);
  font-size:13px;
  border:1px solid var(--wine);
  border-radius:50%;
  width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.section-head h2{
  font-family:var(--font-display);
  font-size:23px;
  margin:0;
  font-weight:700;
}
.shelf-count{
  font-size:12px;
  color:var(--gold);
  background:#fff9ec;
  border:1px solid var(--gold);
  padding:2px 12px;
  border-radius:20px;
  margin-left:auto;
}
.section-sub{
  font-size:13px;
  color:var(--ink-soft);
  margin:-18px 0 26px 40px;
}

/* --- counter / chat --- */
.counter-wrap{
  background:rgba(255,255,255,0.35);
  border:1px solid var(--paper-shadow);
  border-radius:4px;
  padding:20px;
}
.keeper-vignette{
  display:flex;
  justify-content:center;
  margin:-4px 0 12px;
}
.keeper-vignette svg{
  width:min(320px,100%);
  height:auto;
  opacity:.92;
}
.keeper-bio{
  text-align:center;
  margin:-4px 0 14px;
}
.keeper-bio summary{
  font-size:11.5px;
  color:var(--ink-soft);
  cursor:pointer;
  list-style:none;
  display:inline-block;
}
.keeper-bio summary::-webkit-details-marker{ display:none; }
.keeper-bio summary::before{ content:"▸ "; color:var(--gold); }
.keeper-bio[open] summary::before{ content:"▾ "; }
.keeper-bio p{
  font-size:12px;
  color:var(--ink-soft);
  max-width:480px;
  margin:8px auto 0;
  line-height:1.8;
}
.keeper .head, .keeper .book{
  transition:transform .9s ease;
}
.keeper.listening .book{transform:translateY(14px) rotate(-5deg);}
.keeper.listening .head{transform:translateY(-3px);}

.chat-window{
  max-height:360px;
  overflow-y:auto;
  padding:6px 4px 10px;
  display:flex;
  flex-direction:column;
  gap:14px;
}
.bubble{
  max-width:80%;
  padding:12px 16px;
  border-radius:6px;
  font-size:14.5px;
  white-space:pre-wrap;
}
.bubble.shopkeeper{
  align-self:flex-start;
  background:var(--paper-2);
  border:1px solid var(--paper-shadow);
  border-top-left-radius:0;
}
.bubble.shopkeeper .name{
  display:block;
  font-family:var(--font-display);
  font-size:11px;
  color:var(--wine);
  margin-bottom:4px;
  letter-spacing:.1em;
}
.bubble.you{
  align-self:flex-end;
  background:var(--wine);
  color:var(--paper);
  border-top-right-radius:0;
}
.bubble.loading{
  align-self:flex-start;
  background:transparent;
  color:var(--ink-soft);
  font-style:italic;
  font-size:13px;
  padding:0 4px;
}
.chat-input-row{
  display:flex;
  gap:10px;
  margin-top:14px;
  border-top:1px solid var(--paper-shadow);
  padding-top:14px;
}
.chart-options{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:4px 0 6px;
}
.chart-btn{
  font-family:var(--font-body);
  font-size:13px;
  padding:8px 16px;
  border:1px solid var(--gold);
  background:#fff9ec;
  color:var(--ink-soft);
  border-radius:20px;
  cursor:pointer;
}
.chart-btn:hover{background:var(--paper-2);}
.chart-btn.primary{
  background:var(--wine);
  color:var(--paper);
  border-color:var(--wine);
}
.freeform-hint{
  font-size:11px;
  color:var(--ink-soft);
  margin:0 0 4px;
}
.chat-input-row textarea{
  flex:1;
  resize:none;
  font-family:var(--font-body);
  font-size:14px;
  padding:10px 12px;
  border:1px solid var(--paper-shadow);
  border-radius:3px;
  background:#fff9ec;
  color:var(--ink);
  min-height:44px;
}
.chat-input-row textarea:focus, textarea:focus, input:focus, select:focus, button:focus-visible{
  outline:2px solid var(--wine-2);
  outline-offset:1px;
}
.send-btn{
  font-family:var(--font-display);
  background:var(--ink);
  color:var(--paper);
  border:none;
  padding:0 22px;
  border-radius:3px;
  cursor:pointer;
  font-size:14px;
}
.send-btn:disabled{opacity:.5; cursor:default;}

/* --- monthly fair --- */
.fair{
  border:1px solid var(--season-accent, var(--gold));
  background:rgba(255,249,236,0.6);
  border-radius:4px;
  padding:12px 16px;
  margin-bottom:18px;
  display:flex;
  gap:12px;
  align-items:center;
  flex-wrap:wrap;
  font-size:13px;
}
.fair b{
  font-family:var(--font-display);
  color:var(--wine);
  font-size:14px;
}
.fair-line{color:var(--ink-soft); flex:1; min-width:200px;}
.fair-go{
  font-size:12px;
  padding:6px 14px;
  border:1px solid var(--season-accent, var(--gold));
  background:var(--season-accent, var(--gold));
  color:#fff9ec;
  border-radius:20px;
  cursor:pointer;
}

/* --- shelves --- */
.shelf-tabs{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:24px;
  align-items:center;
}
.shelf-tab{
  font-family:var(--font-body);
  font-size:13px;
  padding:7px 14px;
  border:1px solid var(--gold);
  background:transparent;
  color:var(--ink-soft);
  border-radius:20px;
  cursor:pointer;
}
.shelf-tab.active{
  background:var(--gold);
  color:#fff9ec;
  border-color:var(--gold);
}
.shelf-tab.glow{
  border-color:var(--gold);
  box-shadow:0 0 8px rgba(201,165,92,0.6);
}
body:not(.no-motion) .shelf-tab.glow{
  animation:glowPulse 2.8s ease-in-out infinite;
}
@keyframes glowPulse{
  0%,100%{box-shadow:0 0 4px rgba(201,165,92,0.35);}
  50%{box-shadow:0 0 12px rgba(201,165,92,0.75);}
}
.wander-btn{
  font-family:var(--font-body);
  font-size:12.5px;
  padding:7px 14px;
  border:1px dashed var(--wine);
  background:transparent;
  color:var(--wine);
  border-radius:20px;
  cursor:pointer;
  margin-left:auto;
}
.shelf-display{
  background:rgba(255,255,255,0.35);
  border:1px solid var(--paper-shadow);
  border-radius:4px;
  padding:24px;
  touch-action:pan-y;
}
.swipe-hint{
  font-size:11px;
  color:var(--ink-soft);
  text-align:right;
  margin:8px 2px 0;
  letter-spacing:.05em;
}
.definition{
  font-size:13px;
  color:var(--ink-soft);
  margin:0 0 16px;
  padding-bottom:16px;
  border-bottom:1px dashed var(--paper-shadow);
}
.definition b{color:var(--wine);}
.quote-card{
  font-family:var(--font-display);
  font-size:16px;
  line-height:2;
  color:var(--ink);
  padding:6px 0 22px;
  position:relative;
}
.quote-card::before{
  content:"—";
  color:var(--gold);
  margin-right:8px;
}
.quote-source{
  font-size:11.5px;
  color:var(--ink-soft);
  margin:-14px 0 22px;
  text-align:right;
}
.recommend-section{
  margin-top:20px;
  padding-top:18px;
  border-top:1px dashed var(--paper-shadow);
}
.recommend-heading{
  font-family:var(--font-display);
  font-size:14.5px;
  color:var(--wine);
  margin:0 0 4px;
}
.recommend-subtext{
  font-size:11px;
  color:var(--ink-soft);
  margin:0 0 14px;
  line-height:1.6;
}
.recommend-row{
  display:flex;
  align-items:flex-start;
  gap:10px;
  flex-wrap:wrap;
}
.recommend-label{
  font-size:11px;
  color:var(--gold);
  letter-spacing:.1em;
  margin-right:4px;
}
.recommend-chip{
  font-size:12px;
  color:var(--ink-soft);
  background:#fff9ec;
  border:1px solid var(--paper-shadow);
  padding:4px 10px;
  border-radius:20px;
  display:inline-flex;
  flex-direction:column;
  align-items:flex-start;
  gap:2px;
  max-width:260px;
}
.recommend-why{
  font-size:10.5px;
  color:var(--gold);
  white-space:normal;
  line-height:1.5;
}
.recommend-hook{
  display:inline-block;
  font-size:9.5px;
  color:#fff9ec;
  background:var(--wine);
  padding:2px 8px;
  border-radius:10px;
  margin-bottom:4px;
  letter-spacing:.02em;
}
.recommend-source{
  font-size:10px;
  color:var(--wine);
  text-decoration:none;
  border-bottom:1px dashed var(--wine);
}
.recommend-shop-links{
  display:flex;
  gap:10px;
}
.recommend-buy{
  font-size:10.5px;
  color:#B7791F;
  text-decoration:none;
  font-weight:600;
}
.recommend-buy.rakuten{ color:#BF0000; }
.recommend-buy.kindle{ color:#2E6E8E; }
.recommend-buy.audible{ color:#8E5A2E; }
.recommend-buy:hover{text-decoration:underline;}
.recommend-shuffle{
  font-size:11px;
  color:var(--ink-soft);
  background:none;
  border:1px dashed var(--paper-shadow);
  padding:5px 12px;
  border-radius:20px;
  cursor:pointer;
  align-self:center;
}
.recommend-more{
  font-size:11.5px;
  color:var(--wine);
  text-decoration:none;
  border-bottom:1px dashed var(--wine);
  align-self:center;
}
.episode-shuffle{
  font-size:11px;
  color:var(--ink-soft);
  background:none;
  border:1px dashed var(--paper-shadow);
  padding:5px 12px;
  border-radius:20px;
  cursor:pointer;
  margin-top:12px;
}
.episodes-note{
  font-size:10px;
  color:var(--ink-soft);
  opacity:.75;
  margin:8px 0 0;
}
.story-image-btn{
  display:block;
  margin-top:14px;
  font-family:var(--font-display);
  font-size:13px;
  color:#f6e8c9;
  background:var(--wine);
  border:none;
  padding:10px 22px;
  border-radius:20px;
  cursor:pointer;
}
.story-image-btn:disabled{ opacity:.6; }
.story-image-hint{
  font-size:10.5px;
  color:var(--ink-soft);
  margin:8px 0 0;
  line-height:1.6;
}
.shelf-tweets{ margin-top:14px; }
.shelf-tweets-label{
  font-family:var(--font-display);
  font-size:12.5px;
  color:var(--wine);
  margin:0 0 8px;
}
.purify-trigger{
  font-family:var(--font-display);
  font-size:12.5px;
  color:var(--wine);
  background:#fdf6e6;
  border:1px solid var(--wine);
  padding:7px 18px;
  border-radius:20px;
  cursor:pointer;
  margin-top:14px;
  margin-left:10px;
}
.purify-trigger:hover{ background:var(--wine); color:#f6e8c9; }
.music-row{
  margin-top:14px;
}
.playlist-label{
  font-family:var(--font-display);
  font-size:12.5px;
  color:var(--wine);
  margin:0 0 8px;
}
.playlist-tracks{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.playlist-track{
  font-size:12px;
  color:var(--ink-soft);
  text-decoration:none;
  padding:5px 0;
}
.playlist-track:hover{ color:var(--wine); }
.playlist-track-row{
  display:flex;
  flex-wrap:wrap;
  align-items:baseline;
  gap:8px;
  padding:5px 0;
}
.playlist-track-name{
  font-size:12.5px;
  color:var(--ink);
}
.playlist-services{
  display:inline-flex;
  gap:10px;
}
.playlist-services a{
  font-size:10.5px;
  color:var(--wine);
  text-decoration:none;
  border-bottom:1px dashed var(--wine);
}
.music-link{
  font-size:12.5px;
  color:var(--wine);
  text-decoration:none;
  border-bottom:1px dashed var(--wine);
  padding-bottom:1px;
}
.music-link:hover{color:var(--wine-2);}
.episodes{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
}
.episode-card{
  background:#fff9ec;
  border:1px solid var(--paper-shadow);
  border-left:3px solid var(--sage);
  padding:14px 16px;
  font-size:13.5px;
  border-radius:2px;
}
.episode-card.mine{
  border-left:3px solid var(--wine);
  background:#fdf1e0;
  cursor:pointer;
}
.episode-card.mine:hover{ background:#fbe8cf; }
.mine-who{ color:var(--wine) !important; font-weight:600; }
.episode-card .who{
  display:block;
  font-size:11px;
  color:var(--sage);
  margin-bottom:6px;
  letter-spacing:.05em;
}

/* --- desk / submit --- */
.desk-form{
  background:rgba(255,255,255,0.35);
  border:1px solid var(--paper-shadow);
  border-radius:4px;
  padding:22px;
  display:flex;
  flex-direction:column;
  gap:14px;
}
.field-row{display:flex; gap:14px; flex-wrap:wrap;}
.field{display:flex; flex-direction:column; gap:6px; flex:1; min-width:180px;}
.field label{font-size:12px; color:var(--ink-soft); letter-spacing:.05em;}
.field select, .field input, .field textarea{
  font-family:var(--font-body);
  font-size:14px;
  padding:10px 12px;
  border:1px solid var(--paper-shadow);
  border-radius:3px;
  background:#fff9ec;
  color:var(--ink);
}
.field textarea{resize:vertical; min-height:100px;}
.field-hint{
  font-size:11px;
  color:var(--ink-soft);
  line-height:1.6;
}
.desk-extra{
  border-top:1px dashed var(--paper-shadow);
  padding-top:12px;
}
.desk-extra summary{
  font-size:12px;
  color:var(--ink-soft);
  cursor:pointer;
  list-style:none;
}
.desk-extra summary::-webkit-details-marker{ display:none; }
.desk-extra summary::before{ content:"▸ "; color:var(--gold); }
.desk-extra[open] summary::before{ content:"▾ "; }
.count-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}
.assist-link{
  background:none;
  border:none;
  font-size:12px;
  color:var(--sage);
  text-decoration:underline;
  cursor:pointer;
  padding:0;
}
.story-count{font-size:11.5px; color:var(--ink-soft);}
.story-count.over{color:var(--wine); font-weight:700;}
.desk-actions{display:flex; align-items:center; gap:14px; flex-wrap:wrap;}
.bind-btn{
  font-family:var(--font-display);
  background:var(--wine);
  color:var(--paper);
  border:none;
  padding:12px 26px;
  border-radius:3px;
  cursor:pointer;
  font-size:14px;
  letter-spacing:.05em;
}
.bind-btn:disabled{opacity:.5;}
.desk-msg{font-size:12.5px; color:var(--sage);}

/* --- curation box (店主の審査・提案) --- */
.curate-box{
  background:var(--paper-2);
  border:1px solid var(--paper-shadow);
  border-radius:6px;
  border-top-left-radius:0;
  padding:14px 16px;
  font-size:13.5px;
}
.curate-msg{margin:0 0 12px; white-space:pre-wrap;}
.curate-msg::before{
  content:"店主：";
  font-family:var(--font-display);
  color:var(--wine);
  font-size:12px;
  letter-spacing:.1em;
  margin-right:4px;
}
.curate-actions{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
.curate-btn{
  font-size:12.5px;
  padding:7px 16px;
  border-radius:20px;
  border:1px solid var(--gold);
  background:#fff9ec;
  cursor:pointer;
  color:var(--ink-soft);
  font-family:var(--font-body);
}
.curate-btn.primary{background:var(--gold); color:#fff9ec;}
.curate-cancel{
  background:none;
  border:none;
  font-size:12px;
  text-decoration:underline;
  color:var(--ink-soft);
  cursor:pointer;
}

/* --- binding ceremony overlay --- */
.bind-overlay{
  position:fixed; inset:0;
  background:rgba(30,20,10,0.72);
  z-index:60;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:20px;
  cursor:pointer;
}
.bind-book{
  width:120px; height:150px;
  position:relative;
  perspective:700px;
}
.bind-spine-strip{
  position:absolute; left:0; top:0; bottom:0; width:10px;
  background:var(--gold);
  border-radius:2px 0 0 2px;
}
.bind-pages{
  position:absolute; inset:6px 4px 6px 12px;
  background:#fdf6e6;
  border-radius:0 3px 3px 0;
  box-shadow:inset -8px 0 12px rgba(0,0,0,0.08);
}
.bind-cover{
  position:absolute; inset:0 0 0 10px;
  background:var(--wine);
  border-radius:0 4px 4px 0;
  transform-origin:left center;
  transform:rotateY(-150deg);
  box-shadow:2px 3px 12px rgba(0,0,0,0.35);
}
.bind-overlay.animating .bind-cover{
  animation:closeCover 1.7s ease forwards;
}
@keyframes closeCover{
  0%{transform:rotateY(-150deg);}
  45%{transform:rotateY(-150deg);}
  100%{transform:rotateY(0deg);}
}
.bind-text{
  font-family:var(--font-display);
  color:#f2e6c8;
  font-size:15px;
  letter-spacing:.15em;
  margin:0;
}
.bind-skip{
  font-size:11px;
  color:#cbb98f;
  margin:0;
  letter-spacing:.1em;
}

/* ---- purification ritual (気持ちを手放す) ---- */
.purify-overlay{
  position:fixed;
  inset:0;
  background:rgba(20,14,8,0.6);
  z-index:75;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.purify-card{
  background:#fdf6e6;
  max-width:440px;
  width:100%;
  border-radius:6px;
  padding:28px;
  position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
  text-align:center;
}
.purify-close{
  position:absolute;
  top:12px; right:14px;
  background:none; border:none;
  font-size:20px;
  cursor:pointer;
  color:var(--ink-soft);
}
.purify-kicker{
  font-family:var(--font-display);
  font-size:12px;
  color:var(--gold);
  letter-spacing:.1em;
  margin:0 0 10px;
}
.purify-lead{
  font-size:13px;
  color:var(--ink-soft);
  margin:0 0 16px;
  line-height:1.8;
}
.purify-overlay textarea{
  width:100%;
  font-family:var(--font-body);
  font-size:14px;
  padding:10px 12px;
  border:1px solid var(--paper-shadow);
  border-radius:3px;
  background:#fff9ec;
  color:var(--ink);
  resize:vertical;
  margin-bottom:14px;
  transition:opacity 1.2s ease, transform 1.2s ease;
}
.purify-overlay textarea.dissolving{
  opacity:0;
  transform:translateY(10px) scale(0.98);
}
.purify-btn{
  font-family:var(--font-display);
  background:var(--wine);
  color:#f6e8c9;
  border:none;
  padding:10px 26px;
  border-radius:20px;
  cursor:pointer;
  font-size:14px;
}
.purify-btn:disabled{ opacity:.5; }
.purify-msg{
  margin-top:16px;
  font-size:13px;
  color:var(--wine);
  font-family:var(--font-display);
  line-height:1.8;
}

/* --- invitation (体験マッチングのデモ) --- */
.invitation{
  margin-top:18px;
  background:#fdf6e6;
  border:1px solid var(--gold);
  border-radius:4px;
  padding:22px;
  position:relative;
  box-shadow:0 4px 14px rgba(70,45,20,0.12);
}
.inv-seal{
  position:absolute; top:-14px; right:18px;
  width:38px; height:38px;
  border-radius:50%;
  background:var(--wine);
  color:#f2dfc0;
  font-family:var(--font-display);
  display:flex; align-items:center; justify-content:center;
  font-size:15px;
  box-shadow:0 2px 5px rgba(0,0,0,0.25);
}
.inv-kicker{
  font-family:var(--font-display);
  font-size:11px;
  letter-spacing:.3em;
  color:var(--gold);
  margin:0 0 6px;
}
.inv-title{
  font-family:var(--font-display);
  font-size:17px;
  margin:0 0 8px;
  color:var(--wine);
}
.inv-body{font-size:13.5px; margin:0 0 10px;}
.inv-note{font-size:11px; color:var(--ink-soft); margin:0 0 14px;}
.inv-close{
  font-size:12px;
  background:none;
  border:1px solid var(--paper-shadow);
  padding:6px 16px;
  border-radius:20px;
  cursor:pointer;
  color:var(--ink-soft);
}

/* --- bookshelf --- */
.wood-shelf{
  background:linear-gradient(180deg, var(--wood-2), var(--wood));
  border-radius:4px;
  padding:28px 22px 0;
  position:relative;
  min-height:200px;
}
.shelf-row{
  display:flex;
  align-items:flex-end;
  gap:6px;
  padding-bottom:18px;
  border-bottom:14px solid var(--wood-2);
  box-shadow:0 6px 10px rgba(0,0,0,0.35);
  flex-wrap:wrap;
}
.spine{
  writing-mode:vertical-rl;
  text-orientation:mixed;
  font-family:var(--font-display);
  color:#f2e6c8;
  font-size:14px;
  letter-spacing:.12em;
  padding:14px 6px;
  border-radius:2px 2px 0 0;
  cursor:pointer;
  box-shadow:inset -3px 0 0 rgba(0,0,0,0.15), inset 3px 0 0 rgba(255,255,255,0.08);
  transition:transform .15s ease;
  max-height:220px;
  transform:rotate(var(--tilt, 0deg));
}
.spine:hover{transform:translateY(-6px) rotate(var(--tilt, 0deg));}
.spine:active{transform:translateY(-4px) rotate(var(--tilt, 0deg));}
.spine.new{animation:dropIn .5s ease;}
@keyframes dropIn{
  from{transform:translateY(-20px) rotate(var(--tilt, 0deg)); opacity:0;}
  to{transform:rotate(var(--tilt, 0deg)); opacity:1;}
}
.shelf-empty{
  color:#d8c9a5;
  font-size:13px;
  padding:30px 6px 40px;
  text-align:center;
  width:100%;
}
.shelf-controls{
  display:flex;
  justify-content:flex-end;
  margin-top:12px;
}
.reset-link{
  font-size:12px;
  color:var(--ink-soft);
  background:none;
  border:none;
  text-decoration:underline;
  cursor:pointer;
}

/* --- emotion map + shiori --- */
.trend{
  margin-top:26px;
  background:rgba(255,255,255,0.35);
  border:1px solid var(--paper-shadow);
  border-radius:4px;
  padding:20px 22px;
}
.trend h3{
  font-family:var(--font-display);
  font-size:16px;
  margin:0 0 4px;
}
.trend-note{font-size:11px; color:var(--ink-soft); margin:0 0 16px;}
.trend-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
  font-size:12.5px;
}
.trend-label{width:78px; flex-shrink:0; color:var(--ink-soft);}
.trend-bar{height:10px; border-radius:5px; min-width:10px;}
.trend-count{color:var(--ink-soft); font-size:11.5px; flex-shrink:0;}
.trend-summary-main{
  font-size:15px;
  margin:0 0 4px;
  color:var(--wine);
  font-family:var(--font-display);
}
.trend-detail{
  margin-top:10px;
}
.trend-detail summary{
  font-size:12px;
  color:var(--ink-soft);
  cursor:pointer;
  list-style:none;
}
.trend-detail summary::-webkit-details-marker{ display:none; }
.trend-detail summary::before{ content:"▸ "; color:var(--gold); }
.trend-detail[open] summary::before{ content:"▾ "; }
.trend-detail .trend-note{ margin-top:10px; }
#trendBars{ margin-top:10px; }
.shiori-slip{
  display:block;
  margin-top:14px;
  background:#fff9ec;
  border:1px dashed var(--gold);
  padding:12px 16px;
  font-family:var(--font-display);
  font-size:13.5px;
  transform:rotate(-1.2deg);
  color:var(--ink-soft);
  line-height:2;
}
.shiori-label{
  display:block;
  font-size:10.5px;
  letter-spacing:.25em;
  color:var(--gold);
  margin-bottom:4px;
  font-family:var(--font-body);
}
#shioriBtn{margin-top:14px;}

/* --- modal --- */
.modal{
  position:fixed; inset:0;
  background:rgba(20,14,8,0.55);
  display:flex; align-items:center; justify-content:center;
  padding:20px;
  z-index:100;
}
.modal.hidden{display:none;}
.modal-card{
  background:#fdf6e6;
  max-width:520px;
  width:100%;
  max-height:85vh;
  overflow-y:auto;
  border-radius:4px;
  padding:28px;
  position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}
.modal-close{
  position:absolute; top:14px; right:16px;
  background:none; border:none; font-size:20px; cursor:pointer; color:var(--ink-soft);
}
.modal-card h3{
  font-family:var(--font-display);
  font-size:20px;
  margin:0 0 4px;
}
.modal-cat{
  font-size:12px;
  color:var(--wine);
  margin:0 0 2px;
}
.modal-date{
  font-size:11px;
  color:var(--ink-soft);
  margin:0 0 16px;
}
.modal-story{
  font-size:14.5px;
  white-space:pre-wrap;
  line-height:1.9;
}
.modal-tweet{
  margin-top:16px;
  max-height:420px;
  overflow-y:auto;
}
.modal-tweet a.tweet-fallback{
  font-size:12px;
  color:var(--wine);
  text-decoration:none;
  border-bottom:1px dashed var(--wine);
}
.modal-del{
  margin-top:20px;
  font-size:12px;
  color:var(--wine);
  background:none;
  border:1px solid var(--wine);
  padding:6px 14px;
  border-radius:20px;
  cursor:pointer;
}
.modal-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:20px;
}
.modal-actions .modal-del{ margin-top:0; }
.modal-goshelf{
  font-size:12px;
  color:var(--ink-soft);
  background:none;
  border:1px solid var(--gold);
  padding:6px 14px;
  border-radius:20px;
  cursor:pointer;
}

/* エクスポート用のテキストエリア */
#exportTextArea {
  resize: none;
  font-family: var(--font-body);
}

footer.shop-footer{
  text-align:center;
  padding:30px 20px 50px;
  font-size:12px;
  color:var(--ink-soft);
  line-height:1.9;
}
.share-row{ margin-top:18px; }
.legal-row{
  margin-top:14px;
  font-size:10.5px;
}
.legal-row a{
  color:var(--ink-soft);
  text-decoration:underline;
}
.legal-sep{ color:var(--ink-soft); margin:0 6px; }
.share-btn{
  font-family:var(--font-display);
  font-size:13px;
  color:var(--wine);
  background:#fdf6e6;
  border:1px solid var(--wine);
  padding:8px 20px;
  border-radius:20px;
  cursor:pointer;
}
.share-btn:hover{ background:var(--wine); color:#f6e8c9; }

.share-menu{
  position:fixed;
  bottom:24px;
  right:24px;
  background:#fdf6e6;
  border:1px solid var(--gold);
  border-radius:8px;
  padding:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.25);
  z-index:90;
  display:flex;
  flex-direction:column;
  gap:8px;
  min-width:180px;
}
.share-menu-title{
  font-family:var(--font-display);
  font-size:13px;
  color:var(--wine);
  margin:0 0 4px;
}
.share-option{
  font-size:12.5px;
  color:var(--ink-soft);
  background:#fff9ec;
  border:1px solid var(--paper-shadow);
  padding:8px 12px;
  border-radius:6px;
  text-decoration:none;
  text-align:left;
  cursor:pointer;
}
.share-url-input{
  font-size:11px;
  color:var(--ink);
  background:#fff9ec;
  border:1px solid var(--paper-shadow);
  border-radius:6px;
  padding:8px 10px;
  width:100%;
  box-sizing:border-box;
}
.share-menu-hint{
  font-size:10px;
  color:var(--ink-soft);
  margin:0;
  line-height:1.5;
}
.share-option:hover{ background:var(--paper-2); }
.share-close{ color:var(--wine); border-color:var(--wine); }

.milestone-toast{
  position:fixed;
  left:50%;
  bottom:24px;
  transform:translateX(-50%) translateY(20px);
  background:var(--wine);
  color:#f6e8c9;
  font-family:var(--font-display);
  font-size:13.5px;
  padding:14px 24px;
  border-radius:6px;
  box-shadow:0 8px 24px rgba(0,0,0,0.3);
  opacity:0;
  transition:opacity .4s ease, transform .4s ease;
  z-index:80;
  max-width:min(90vw, 420px);
  text-align:center;
}
.milestone-toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

@media (max-width:600px){
  .field-row{flex-direction:column;}
  .wander-btn{margin-left:0; width:100%;}
}

/* ---- 携帯（スマホ）向けの包括的な調整 ---- */
/* ---- 夜の書店モード（22時〜5時に自動適用：セピアを帯びた深い夜の読書室） ---- */
body.night{
  --paper:#2A2620;
  --paper-2:#221E19;
  --paper-shadow:#4A4236;
  --ink:#D8CCB4;
  --ink-soft:#A89878;
  --wine:#B77884;
  --wine-2:#C98A96;
  --gold:#C9A860;
  --sage:#8FA382;
  --wood:#1C1610;
  --wood-2:#141008;
}
body.night .episode-card,
body.night .recommend-chip,
body.night .shelf-display,
body.night .fair,
body.night .intro-step,
body.night .desk-form,
body.night .trend,
body.night .chat-window .bubble.shopkeeper{
  background:#332E26;
}
body.night .chat-window .bubble.user{ background:#4A3038; }
body.night .modal-card,
body.night .purify-card,
body.night .share-menu{ background:#2E2922; }
body.night .page-nav{ background:linear-gradient(180deg, rgba(34,30,25,0.97), rgba(34,30,25,0.9)); }
body.night .page-tab{ background:#332E26; }
body.night textarea, body.night input, body.night select{ background:#262219; color:var(--ink); }

/* ---- タブレット（〜768px）向けの調整 ---- */
@media (max-width:768px){
  section{ padding:44px 20px; }
  .entrance h1{ font-size:34px; }
  .intro-steps{ gap:12px; }
  .episodes{ grid-template-columns:1fr 1fr; }
  .recommend-chip{ max-width:100%; }
  .chat-window{ max-height:320px; }
  .playlist-track-row{ flex-direction:column; align-items:flex-start; gap:4px; }
}

@media (max-width:480px){
  .entrance{ padding:44px 16px 32px; }
  .entrance h1{ font-size:26px; }
  .tagline{ font-size:15px; }
  .sub-tagline{ font-size:12px; }
  .enter-btn{ width:100%; padding:14px 20px; }
  .pref-row{ gap:8px; }

  .page-nav{ padding:8px; gap:4px; }
  .page-tab{ font-size:11px; padding:7px 10px 8px; flex:1; text-align:center; }

  .intro-explainer{ padding:24px 16px; }
  .intro-steps
